{# Expects a `video` dict with keys: id, title, uploader, duration, thumbnail, view_count #}
<article class="video-card">
  <a href="/watch/{{ video.id }}" class="video-card__thumb-link">
    <div class="video-card__thumb-wrap">
      <img
        class="video-card__thumb"
        src="{{ video.thumbnail }}"
        alt="{{ video.title }}"
        loading="lazy"
      />
      <span class="video-card__duration">
        {{ (video.duration // 60)|string }}:{{ '%02d' % (video.duration % 60) }}
      </span>
    </div>
  </a>
  <div class="video-card__meta">
    <a href="/watch/{{ video.id }}" class="video-card__title">
      {{ video.title }}
    </a>
    <p class="video-card__uploader">{{ video.uploader }}</p>
    <p class="video-card__views">
      {{ "{:,}".format(video.view_count) }} views
    </p>
  </div>
</article>
